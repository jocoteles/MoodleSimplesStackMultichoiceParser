# Model for numeric questions in STACK Moodle

- category: Geometria

- id: 0001
  name: Paralelepípedo
  type: numerical
  testoptions: 0.1
  significantfigures: 1
  penalty: 0.1
  questiontext: |
    <p>Considere um paralelepípedo com largura \(x\), comprimento \(y\) e altura \(z\), sendo \(x = [[x]]\) m, \(y = [[y, s:2]]\) m e \(z = [[z, s:4]]\) m. Calcule:</p>
    <p>Volume: {{ta1, s:2, v:7}} m³</p>
    <p>Área da base: {{ta2, v:3}} m²</p>
  questionvariables:
    x: randint(10, 20)
    y: randint(2, 5)
    z: rand(2.0, 5.0)
    ta1: x*y*z
    ta2: x*y

- id: 0002
  name: Cilindro
  type: numerical
  penalty: 0.1
  questiontext: |
    <p> Considere um cilindro com raio da base igual a [[r]] cm e altura igual a [[h]] cm. Calcule:</p>
    <p>Volume: {{ta1, s:2, v:5}} cm³</p>
    <p>Área da base: {{ta2, v:5}} cm²</p>
    <p>Área lateral: {{ta3, v:5}} cm²</p>
  questionvariables:
    r: randint(1, 10)
    h: rand(2.0, 5.0)
    ta1: pi*r*r*h
    ta2: pi*r*r
    ta3: 2*pi*r*h
